services:
  postgres:
    image: postgres:17-alpine
    container_name: checklist-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: checklist
      POSTGRES_PASSWORD: checklist
      POSTGRES_DB: checklist
    volumes:
      - checklist-data:/var/lib/postgresql/data

volumes:
  checklist-data:
