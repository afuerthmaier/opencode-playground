<form (ngSubmit)="handleSubmit()" class="bg-white border border-gray-200 rounded-xl p-5 shadow-sm space-y-3">
  <h2 class="text-base font-semibold text-gray-700">Add item</h2>

  @if (error()) {
    <p class="text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-3 py-2">{{ error() }}</p>
  }

  <input
    type="text"
    placeholder="Title *"
    [(ngModel)]="title"
    name="title"
    maxlength="255"
    required
    class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500"
  />

  <input
    type="text"
    placeholder="Description (optional)"
    [(ngModel)]="description"
    name="description"
    maxlength="4000"
    class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500"
  />

  <button
    type="submit"
    [disabled]="!title.trim()"
    class="w-full rounded-lg bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
  >
    Add item
  </button>
</form>
