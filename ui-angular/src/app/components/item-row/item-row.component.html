<li class="flex items-start justify-between gap-4 rounded-xl border border-gray-200 bg-white px-4 py-3 shadow-sm">
  <div class="flex items-start gap-3 min-w-0">
    <span class="mt-0.5 h-4 w-4 shrink-0 rounded-full border-2"
      [ngClass]="{
        'border-indigo-500 bg-indigo-500': item().completed,
        'border-gray-300 bg-white': !item().completed
      }"></span>
    <div class="min-w-0">
      <p class="text-sm font-medium truncate"
        [ngClass]="{
          'text-gray-400 line-through': item().completed,
          'text-gray-900': !item().completed
        }">
        {{ item().title }}
      </p>
      @if (item().description) {
        <p class="text-xs text-gray-500 mt-0.5 truncate">{{ item().description }}</p>
      }
    </div>
  </div>

  <button
    type="button"
    (click)="deleteItem()"
    [attr.aria-label]="'Delete ' + item().title"
    class="shrink-0 rounded-lg p-1.5 text-gray-400 hover:bg-red-50 hover:text-red-500 transition-colors"
  >
    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6M9 7h6m2 0a1 1 0 00-1-1h-4a1 1 0 00-1 1H5"></path>
    </svg>
  </button>
</li>
